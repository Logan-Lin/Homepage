<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yan Lin's Presentations</title>
  <link rel="icon" href="/logo.webp" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/index.css">
  <link href="https://fonts.googleapis.com/css?family=Lato|Abril+Fatface&display=swap" rel="stylesheet">
</head>

<body>
  <div class="container">
    <header class="border-bottom lh-1 py-3 border-secondary">
      <div class="row flex-nowrap justify-content-between align-items-center">
        <div class="col-2 pt-1">
          <a class="link-secondary header-icon px-2" href="/"><i class="bi bi-house-fill"></i></a>
        </div>
        <div class="col-8 text-center">
          <div class="page-header-logo h2 m-0 fw-bold" style="font-family: 'Abril Fatface', serif;">Yan Lin's Presentations</div>
        </div>
        <div class="col-2 d-flex justify-content-end align-items-center"></div>
      </div>
    </header>
  </div>

  <main class="container">
    <article class="section">
      <div>
        <div id="presentations" class="list-group list-group-flush"></div>
      </div>
    </article>
    <p class="text-center text-secondary" style="font-size: 0.8rem; font-family: 'Lato', sans-serif;">Copyright © 2025. Designed and implemented by Yan Lin.</p>
  </main>
  <button id="back-to-top" class="btn btn-light rounded-circle" style="position: fixed; bottom: 20px; right: 20px; display: none; z-index: 1000; width: 40px; height: 40px; padding: 0;"><i class="bi bi-chevron-up"></i></button>
</body>

</html>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="/data.js"></script>
<script src="/render.js"></script>
<script>
$(document).ready(function() {
  const $presentationsContainer = $("#presentations");
  if ($presentationsContainer.length) {
    $presentationsContainer.html(profileData.presentations.map(presentation => renderPresentation(presentation, 'primary')).join(""));
  }
});
</script>
<script src="/scroll.js"></script>
