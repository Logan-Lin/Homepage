<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yan Lin's Homepage</title>
  <link rel="icon" href="logo.webp" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>

<body>
  <div class="container">
    <header class="border-bottom lh-1 py-3">
      <div class="row flex-nowrap justify-content-between align-items-center">
        <div class="col-2 pt-1">
          <a class="link-secondary header-icon" href="mailto:s@yanlincs.com"><i class="bi bi-envelope-fill"></i></a>
        </div>
        <div class="col-8 text-center">
          <span class="page-header-logo text-body-emphasis text-decoration-none">Yan Lin's Homepage</span>
        </div>
        <div class="col-2 d-flex justify-content-end align-items-center">
          <a class="link-secondary header-icon" href="https://scholar.google.com/citations?user=nHMmG2UAAAAJ&hl=en"
            target="_blank"><i class="bi bi-google"></i></a>
        </div>
      </div>
    </header>
  </div>

  <main class="container">
    <div class="row g-0 border rounded text-body-emphasis bg-body-secondary flex-md-row my-4 shadow-sm position-relative">
      <div class="col p-4 d-flex flex-column position-static">
        <h2 class="display-7 fst-italic mb-3">Biography</h2>
        <p class="card-text mb-auto" style="font-size: 1.1rem;">I am currently a postdoctoral researcher in the Department of Computer Science at Aalborg University. I received my PhD and Bachelor's degrees from Beijing Jiaotong University, China.
        </p>
      </div>
      <div class="col-auto d-none d-lg-block">
        <img src="profile.webp" alt="Yan Lin" class="bd-placeholder-img rounded" style="max-height: 180px;">
      </div>
    </div>

    <article class="section">
      <h2 class="section-title link-body-emphasis mb-1 display-7">Publications</h2>
      <div id="publications">
        <div id="primary-publications"></div>
        <hr class="my-3">
        <div id="secondary-publications"></div>
      </div>
    </article>
  </main>
</body>

</html>
